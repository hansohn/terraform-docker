---
name: docker

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - '**'
    tags:
      - 'v?[0-9]+.[0-9]+.[0-9]+'
  schedule:
    - cron: '17 7 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  BUILD_CONTEXT: '.'
  DOCKER_PLATFORMS: 'linux/amd64,linux/arm64'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [ lint ]
    if: |
      github.event_name != 'schedule'
      && !(github.event_name == 'push' && github.ref_type == 'tag')
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Prepare metadata
        id: prep
        run: |
          version=$(grep -E '^ARG TERRAFORM_VERSION=' Dockerfile | head -1 | cut -d= -f2)
          {
            echo "version=${version}"
            echo "minor=${version%.*}"
            echo "major=${version%%.*}"
            echo "repo=${GITHUB_REPOSITORY%-docker}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.prep.outputs.repo }}
          tags: |
            type=raw,value=${{ steps.prep.outputs.version }}
            type=raw,value=${{ steps.prep.outputs.minor }}
            type=raw,value=${{ steps.prep.outputs.major }}
            type=raw,value=latest

      - name: Build
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.BUILD_CONTEXT }}
          platforms: ${{ env.DOCKER_PLATFORMS }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}
          provenance: true
          sbom: true

      - name: Build Summary
        run: |
          echo "### Build Complete :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.prep.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Platforms:** ${{ env.DOCKER_PLATFORMS }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [ lint ]
    if: |
      github.event_name == 'push'
      && github.ref_type == 'tag'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Prepare metadata
        id: prep
        run: |
          version=$(grep -E '^ARG TERRAFORM_VERSION=' Dockerfile | head -1 | cut -d= -f2)
          {
            echo "version=${version}"
            echo "minor=${version%.*}"
            echo "major=${version%%.*}"
            echo "repo=${GITHUB_REPOSITORY%-docker}"
          } >> "$GITHUB_OUTPUT"

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.prep.outputs.repo }}
          tags: |
            type=raw,value=${{ steps.prep.outputs.version }}
            type=raw,value=${{ steps.prep.outputs.minor }}
            type=raw,value=${{ steps.prep.outputs.major }}
            type=raw,value=latest

      - name: Build
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.BUILD_CONTEXT }}
          platforms: ${{ env.DOCKER_PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}
          provenance: true
          sbom: true

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.prep.outputs.repo }}:${{ steps.prep.outputs.version }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Deploy Summary
        run: |
          echo "### Deploy Complete :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.prep.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Platforms:** ${{ env.DOCKER_PLATFORMS }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  refresh:
    name: Refresh
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [ lint ]
    if: github.event_name == 'schedule'
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get previous tag
        id: previous_tag
        uses: WyriHaximus/github-action-get-previous-tag@v2
        with:
          fallback: main

      - name: Checkout previous tag
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.previous_tag.outputs.tag }}

      - name: Prepare metadata
        id: prep
        run: |
          version=$(grep -E '^ARG TERRAFORM_VERSION=' Dockerfile | head -1 | cut -d= -f2)
          {
            echo "version=${version}"
            echo "minor=${version%.*}"
            echo "major=${version%%.*}"
            echo "repo=${GITHUB_REPOSITORY%-docker}"
          } >> "$GITHUB_OUTPUT"

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.prep.outputs.repo }}
          tags: |
            type=raw,value=${{ steps.prep.outputs.version }}
            type=raw,value=${{ steps.prep.outputs.minor }}
            type=raw,value=${{ steps.prep.outputs.major }}
            type=raw,value=latest

      - name: Rebuild and push
        uses: docker/build-push-action@v7
        with:
          context: ${{ env.BUILD_CONTEXT }}
          platforms: ${{ env.DOCKER_PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=refresh
          cache-to: type=gha,mode=max,scope=refresh
          provenance: true
          sbom: true

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.prep.outputs.repo }}:${{ steps.prep.outputs.version }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true

      - name: Refresh Summary
        run: |
          echo "### Refresh Complete :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ steps.prep.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Platforms:** ${{ env.DOCKER_PLATFORMS }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  dockerhub:
    name: Dockerhub
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [ deploy, refresh ]
    if: |
      always()
      && !contains(needs.*.result, 'failure')
      && (contains(needs.deploy.result, 'success') || contains(needs.refresh.result, 'success'))
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set DOCKER_REPO env
        run: echo "DOCKER_REPO=${GITHUB_REPOSITORY%-docker}" >> $GITHUB_ENV

      - name: Update dockerHub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKER_REPO }}
          short-description: ${{ github.event.repository.description }}

  slack:
    name: Slack
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [ build, dockerhub ]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Slack Notification
        uses: Gamesight/slack-workflow-status@v2.0.0
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          slack_webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          channel: ${{ secrets.SLACK_CHANNEL_ID }}
          name: ${{ secrets.SLACK_USERNAME }}
          icon_url: "https://cdn-icons-png.flaticon.com/512/25/25231.png"
